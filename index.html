<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mourn</title>

    <style>
        @font-face {
            font-family: 'Orbitron';
            font-style: normal;
            font-weight: 400;
            font-display: swap;
            src: url('orbitron-regular.ttf') format('truetype');
        }
        @font-face {
            font-family: 'Orbitron';
            font-style: normal;
            font-weight: 700;
            font-display: swap;
            src: url('orbitron-bold.ttf') format('truetype');
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Orbitron', sans-serif;
            height: 100vh;
            overflow: hidden;
            background-color: black;
            color: white;
            cursor: url("cur.png") 16 16, crosshair !important;
        }

        a, button, .click-overlay, .badge, .social-icon, .mute-btn {
            cursor: url("cur.png") 16 16, crosshair !important;
        }

        #bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
        }

        #bg-music {
            position: absolute;
            opacity: 0;
            pointer-events: none;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: -1;
        }

        .click-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            backdrop-filter: blur(15px);
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 48px;
            font-weight: bold;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.6);
            z-index: 2000;
            cursor: pointer;
            transition: opacity 0.6s ease;
        }

        .click-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .mute-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30%;
            width: 50px;
            height: 50px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .mute-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        @keyframes rotate-icon {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(180deg); }
            100% { transform: rotate(360deg); }
        }

        .mute-btn.rotating {
            animation: rotate-icon 0.4s ease-in-out;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
        }

        .bio-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            color: white;
            min-width: 400px;
            transition: all 0.8s ease;
            transform-style: preserve-3d;
            perspective: 1000px;
            opacity: 0;
        }

        .bio-card.visible {
            opacity: 1;
        }

        .profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 30%;
            border: 4px solid rgba(255, 255, 255, 0.3);
            margin: 0 auto 20px;
            overflow: hidden;
        }

        .profile-pic img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .name {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .description {
            font-size: 16px;
            margin-bottom: 25px;
            min-height: 24px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
        }

        .badges {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .badge {
            background: linear-gradient(135deg, #ffffff18 0%, #ffffff18 100%);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        .badge:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(211, 211, 211, 0.8);
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .social-icon {
            font-size: 24px;
            color: white;
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .social-icon:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(211, 211, 211, 0.8);
        }

        @media (max-width: 768px) {
            .bio-card {
                min-width: 90%;
            }

            .name {
                font-size: 24px;
            }
        }

        #particles-js {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -3;
        }

        .icon-svg {
            display: inline-block;
            vertical-align: middle;
        }

    </style>
</head>
<body>

    <div id="particles-js"></div>
    <video id="bg-video" loop muted autoplay>
        <source src="videoplayback (1).mp4" type="video/mp4">
        <source src="videoplayback.mp4" type="video/mp4">
        <source src="background.mp4" type="video/mp4">
        <source src="video.mp4" type="video/mp4">
        <source src="bg.mp4" type="video/mp4">
        <source src="bg-video.mp4" type="video/mp4">
        Votre navigateur ne supporte pas la vidéo HTML5.
    </video>

    <audio id="bg-music" loop>
        <source src="La Rvfleuse.mp3" type="audio/mpeg">
    </audio>

    <div class="overlay"></div>

    <div class="click-overlay" id="clickOverlay">Click me</div>

    <button class="mute-btn" id="muteBtn" onclick="toggleMute()">
        <svg class="icon-svg" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
            <path d="M3.29 2.29L2.01 3.57 6.44 8H3v8h4l5 5v-7.17l5.22 5.22c-.66.49-1.39.87-2.22 1.12v2.06c1.37-.32 2.61-.98 3.66-1.84l2.77 2.77 1.28-1.28L3.29 2.29zM10 16.17L7.83 14H5v-4h2.17l2.83-2.83v9zM19 12c0-1.88-.77-3.58-2-4.82V5.06c2.32 1.5 4 4.14 4 7.17c0 1.94-.65 3.72-1.75 5.16l-1.46-1.46c.76-1.04 1.21-2.31 1.21-3.87zm-4.5-5.5V4l-2.07 2.07L14.5 8.14V6.5z"/>
        </svg>
    </button>

    <div class="container">
        <div class="bio-card" id="bioCard">
            <div class="profile-pic">
                <img src="image.png" onerror="this.onerror=null; this.src='animated.gif';" alt="Photo de profil">
            </div>
            <div class="name">mourn</div>
            <div class="description" id="typingText"></div>

            <div class="badges">
                <span class="badge">C#</span>
                <span class="badge">C++</span>
            </div>

            <div class="social-icons">
                <a href="https://www.tiktok.com/@MS4wLjABAAAA9SpnEDJPKeKHNSnIOHpmVx3wy_rYatY-TvFiqxTYyL4bzsNTKrWdD_UGlVcFvZfT?_r=1&_t=ZS-97AnaXxcmA8" title="Discord">
                    <img src="icon.png" width="45" height="45" alt="Discord" style="object-fit:contain;">
                </a>
                <a href="https://discord.com/invite/evolol" class="social-icon" title="TikTok">
                    <img src="icon2.png" width="45" height="45" alt="TikTok" style="object-fit:contain;">
                </a>
            </div>
        </div>
    </div>

<script>
    let isMuted = true;
    const music = document.getElementById('bg-music');
    const video = document.getElementById('bg-video');
    const muteBtn = document.getElementById('muteBtn');
    const bioCard = document.getElementById('bioCard');
    const clickOverlay = document.getElementById('clickOverlay');

    function toggleMute() {
        muteBtn.classList.add("rotating");

        if (isMuted) {
            music.play().catch(err => console.log("Audio konnte nicht gestartet werden:", err));
            music.muted = false;

            if (video) {
                video.muted = true;
                video.play().catch(err => console.log("Video konnte nicht gestartet werden:", err));
            }
        } else {
            music.muted = true;
        }
        isMuted = !isMuted;

        setTimeout(() => {
            if (!isMuted) {
                muteBtn.innerHTML = '<svg class="icon-svg" viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm8 7.17L8.83 14H5v-4h3.83L11 7.83v8.34zM16.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>';
            } else {
                muteBtn.innerHTML = '<svg class="icon-svg" viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M3.29 2.29L2.01 3.57 6.44 8H3v8h4l5 5v-7.17l5.22 5.22c-.66.49-1.39.87-2.22 1.12v2.06c1.37-.32 2.61-.98 3.66-1.84l2.77 2.77 1.28-1.28L3.29 2.29zM10 16.17L7.83 14H5v-4h2.17l2.83-2.83v9zM19 12c0-1.88-.77-3.58-2-4.82V5.06c2.32 1.5 4 4.14 4 7.17c0 1.94-.65 3.72-1.75 5.16l-1.46-1.46c.76-1.04 1.21-2.31 1.21-3.87zm-4.5-5.5V4l-2.07 2.07L14.5 8.14V6.5z"/></svg>';
            }
        }, 200);

        setTimeout(() => {
            muteBtn.classList.remove("rotating");
        }, 400);
    }

    function enableCardTilt() {
        bioCard.addEventListener('mousemove', (e) => {
            const rect = bioCard.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;
            const rotateX = (y - centerY) / centerY * -15;
            const rotateY = (x - centerX) / centerX * 15;
            bioCard.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        });

        bioCard.addEventListener('mouseleave', () => {
            bioCard.style.transform = 'perspective(1000px) rotateX(0deg) rotateY(0deg)';
        });
    }

    document.addEventListener('click', () => {
        if (!clickOverlay.classList.contains('hidden')) {
            clickOverlay.classList.add('hidden');
            if (isMuted) toggleMute();
            setTimeout(() => {
                clickOverlay.style.display = "none";
                bioCard.classList.add("visible");
                enableCardTilt();
            }, 600);
        }
    }, { once: true });

    const texts = ["Chair Developer", "C++ Dev"];
    let currentTextIndex = 0;
    let currentCharIndex = 0;
    let isDeleting = false;
    const typingElement = document.getElementById("typingText");

    function type() {
        const currentText = texts[currentTextIndex];
        if (isDeleting) {
            currentCharIndex--;
            typingElement.textContent = currentText.substring(0, currentCharIndex);
            if (currentCharIndex === 0) {
                isDeleting = false;
                currentTextIndex = (currentTextIndex + 1) % texts.length;
                setTimeout(type, 500);
            } else {
                setTimeout(type, 50);
            }
        } else {
            currentCharIndex++;
            typingElement.textContent = currentText.substring(0, currentCharIndex);
            if (currentCharIndex === currentText.length) {
                isDeleting = true;
                setTimeout(type, 1500);
            } else {
                setTimeout(type, 100);
            }
        }
    }

    type();
</script>

<script src="particles.min.js"></script>
<script>
if (typeof particlesJS !== 'undefined') {
    particlesJS.load('particles-js', 'particles.json', function () {
        console.log('particles.js loaded - rain effect');
    });
} else {
    console.warn("particles.min.js nicht gefunden – Partikel-Effekt deaktiviert");
}
</script>
</body>
</html>
